# AutoGeo 生产环境 Nginx 配置
# 版本: 2.0.0 - 支持前后端分离部署

server {
    listen 80;
    server_name _;  # 接受所有域名，或改为你的IP/域名

    # 健康检查端点
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # API 代理 - 后端 FastAPI 服务
    # ============================================
    location /api/ {
        proxy_pass http://backend_servers/api/;
        proxy_http_version 1.1;

        # 超时设置（后端处理可能较慢）
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 缓存控制
        proxy_set_header Cache-Control "no-cache";
    }

    # ============================================
    # WebSocket 代理 - 实时日志推送
    # ============================================
    location /ws {
        proxy_pass http://backend_servers/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ============================================
    # 静态文件服务 - 后端上传的文件
    # ============================================
    location /static/ {
        proxy_pass http://backend_servers/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # 后端文档和 OpenAPI
    # ============================================
    location /docs {
        proxy_pass http://backend_servers/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend_servers/openapi.json;
        proxy_set_header Host $host;
    }

    # ============================================
    # 前端 Web 应用 - 静态文件服务
    # ============================================
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 缓存控制
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # HTML 文件不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
