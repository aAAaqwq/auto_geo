# AutoGeo Backend Docker Compose
# 生产环境配置

version: '3.8'

services:
  # FastAPI 后端服务
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-your-username}/auto_geo_backend:latest
    container_name: autogeo-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8001
    volumes:
      # 数据持久化（重要！）
      - ./data:/app/data
      - ./logs:/app/logs
      - ./database:/app/backend/database
      - ./cookies:/app/.cookies
      # Playwright 浏览器缓存
      - playwright-cache:/home/autogeo/.cache/ms-playwright
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - autogeo-network

  # Nginx 反向代理（可选，用于HTTPS和域名访问）
  # nginx:
  #   image: nginx:alpine
  #   container_name: autogeo-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - autogeo-network

volumes:
  playwright-cache:
    driver: local

networks:
  autogeo-network:
    driver: bridge
