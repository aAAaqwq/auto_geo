name: Deploy All (Backend + Frontend)

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: '部署后端'
        required: true
        default: 'true'
        type: boolean
      deploy_frontend:
        description: '部署前端'
        required: true
        default: 'true'
        type: boolean
      skip_tests:
        description: '跳过测试'
        required: true
        default: 'false'
        type: boolean

jobs:
  # ============================================
  # 部署后端
  # ============================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_backend == true }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-lwz264sedmauvivo.cn-guangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            crpi-lwz264sedmauvivo.cn-guangzhou.personal.cr.aliyuncs.com/opencaio/auto_geo_backend:latest
            crpi-lwz264sedmauvivo.cn-guangzhou.personal.cr.aliyuncs.com/opencaio/auto_geo_backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Deploy backend to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          timeout: 300s
          script: |
            set -e
            echo "🚀 [Backend] 开始部署..."

            PROJECT_DIR="~/Auto_GEO"
            if [ ! -d "$PROJECT_DIR" ]; then
              git clone https://github.com/aAAaqwq/Auto_GEO.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            cd "$PROJECT_DIR/deploy"
            export DEPLOY_DIR="$PROJECT_DIR/deploy"

            if [ ! -f ".env.backend" ]; then
              echo "❌ .env.backend 不存在"
              exit 1
            fi

            docker login crpi-lwz264sedmauvivo.cn-guangzhou.personal.cr.aliyuncs.com \
              -u "${{ secrets.ALIYUN_ACR_USERNAME }}" \
              -p "${{ secrets.ALIYUN_ACR_PASSWORD }}" 2>/dev/null || true

            docker-compose -f deploy/backend/docker-compose.yml pull backend || true
            docker-compose -f deploy/backend/docker-compose.yml up -d

            # 更新环境变量并重启（确保 JWT_SECRET_KEY 生效）
            if grep -q "JWT_SECRET_KEY" .env.backend 2>/dev/null; then
              echo "✅ JWT_SECRET_KEY 已配置"
            else
              echo "⚠️  JWT_SECRET_KEY 未在 .env.backend 中找到，请确保已配置"
            fi

            sleep 10

            if curl -sf http://localhost:8001/api/health > /dev/null 2>&1; then
              echo "✅ [Backend] 部署成功"
            else
              echo "❌ [Backend] 健康检查失败"
              docker-compose -f deploy/backend/docker-compose.yml logs --tail=30 backend
              exit 1
            fi

  # ============================================
  # 部署前端
  # ============================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_frontend == true }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Create production env
        working-directory: ./frontend
        run: |
          cat > .env.production << EOF
          VITE_API_BASE_URL=http://${{ secrets.SERVER_HOST }}/api
          VITE_WS_URL=ws://${{ secrets.SERVER_HOST }}/ws
          VITE_STATIC_URL=http://${{ secrets.SERVER_HOST }}/static
          VITE_ENABLE_MOCK=false
          EOF

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build:renderer

      - name: Ensure target directory exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            mkdir -p ~/Auto_GEO/deploy/nginx/html

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "frontend/out/renderer/*"
          target: "~/Auto_GEO/deploy/nginx/html"
          strip_components: 2
          rm: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "🚀 [Frontend] 部署..."
            cd ~/Auto_GEO/deploy
            docker-compose -f backend/docker-compose.yml exec -T nginx nginx -s reload 2>/dev/null || \
              docker-compose -f backend/docker-compose.yml up -d nginx
            echo "✅ [Frontend] 部署完成"

  # ============================================
  # 部署总结
  # ============================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "### 🚀 全量部署完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 组件 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event.inputs.deploy_backend }}" == "true" ]; then
            if [ "${{ needs.deploy-backend.result }}" == "success" ]; then
              echo "| 后端 | ✅ 成功 |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| 后端 | ❌ 失败 |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| 后端 | ⏭️ 跳过 |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ github.event.inputs.deploy_frontend }}" == "true" ]; then
            if [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
              echo "| 前端 | ✅ 成功 |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| 前端 | ❌ 失败 |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| 前端 | ⏭️ 跳过 |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**访问地址**: http://${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
