name: Backend Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: '部署到服务器'
        required: true
        default: 'true'

env:
  PYTHON_VERSION: '3.12'
  # GHCR 配置（备用）
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: ghcr.io/architecture-matrix/auto_geo_backend
  # 阿里云 ACR 个人版配置（广州）
  ALIYUN_REGISTRY: crpi-lwz264sedmauvivo.cn-guangzhou.personal.cr.aliyuncs.com
  ALIYUN_IMAGE: crpi-lwz264sedmauvivo.cn-guangzhou.personal.cr.aliyuncs.com/opencaio/auto_geo_backend
  # 老王备注：个人版ACR地址格式是 crpi-xxx.personal.cr.aliyuncs.com

jobs:
  # ============================================
  # 第一步：构建并推送到双仓库
  # ============================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============================================
      # 登录 GHCR
      # ============================================
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # 登录 阿里云 ACR
      # ============================================
      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.ALIYUN_IMAGE }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push to both registries
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 老王备注：zstd压缩，加快拉取速度
          compression: zstd
          compression-level: 9
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      # ============================================
      # 验证镜像推送成功
      # ============================================
      - name: Verify images
        run: |
          echo "=== 验证 GHCR 镜像 ==="
          docker buildx imagetools inspect ${{ env.GHCR_IMAGE }}:latest || echo "GHCR镜像可能还未同步"
          echo ""
          echo "=== 验证 阿里云 ACR 镜像 ==="
          docker buildx imagetools inspect ${{ env.ALIYUN_IMAGE }}:latest || echo "阿里云镜像可能还未同步"

  # ============================================
  # 第二步：部署到服务器
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: false
          timeout: 1800s
          command_timeout: 1800s
          script: |
            set -e

            echo "🚀 开始部署 AutoGeo 后端..."

            # 设置变量
            # 老王备注：优先使用阿里云镜像，失败则用GHCR
            ALIYUN_IMAGE="${{ env.ALIYUN_IMAGE }}"
            GHCR_IMAGE="${{ env.GHCR_IMAGE }}"
            CONTAINER_NAME="autogeo-backend"
            PORT="${{ secrets.BACKEND_PORT || 8001 }}"
            MAX_RETRIES=3
            RETRY_DELAY=10

            # ============================================
            # 登录到两个镜像仓库
            # ============================================
            echo "🔐 登录到镜像仓库..."

            # 登录 GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin 2>/dev/null || echo "GHCR登录失败，继续"

            # 登录 阿里云 ACR
            echo "${{ secrets.ALIYUN_ACR_PASSWORD }}" | docker login ${{ env.ALIYUN_REGISTRY }} -u "${{ secrets.ALIYUN_ACR_USERNAME }}" --password-stdin 2>/dev/null || echo "阿里云ACR登录失败，继续"

            # 检查服务器状态
            echo "📊 检查服务器状态..."
            echo "=== 磁盘空间 ==="
            df -h
            echo "=== Docker 版本 ==="
            docker version --format '{{.Server.Version}}' 2>/dev/null || echo "无法获取版本"

            # ============================================
            # 核心策略：优先从阿里云拉取（快），失败则从GHCR拉取（慢）
            # ============================================

            echo ""
            echo "📦 第一步：清理本地缓存的 latest 镜像..."

            # 老王备注：先删除本地 latest 标签的旧镜像，确保拉取到最新版本
            docker rmi $ALIYUN_IMAGE:latest 2>/dev/null || echo "阿里云镜像本地无缓存"
            docker rmi $GHCR_IMAGE:latest 2>/dev/null || echo "GHCR镜像本地无缓存"

            echo ""
            echo "📦 第二步：拉取最新镜像（优先阿里云）..."

            PULL_SUCCESS=0
            USE_REGISTRY=""

            # 尝试从阿里云拉取
            echo ""
            echo "=== 尝试从 阿里云ACR 拉取（广州） ==="
            echo "镜像地址: $ALIYUN_IMAGE"
            echo "开始时间: $(date)"

            if docker pull $ALIYUN_IMAGE:latest 2>&1 | tee /tmp/pull.log; then
              PULL_SUCCESS=1
              USE_REGISTRY="aliyun"
              IMAGE_TO_USE="$ALIYUN_IMAGE:latest"
              echo "✅ 阿里云镜像拉取成功！"
              echo "结束时间: $(date)"
            else
              echo "⚠️  阿里云拉取失败，尝试从 GHCR 拉取..."
              echo "开始时间: $(date)"

              if docker pull $GHCR_IMAGE:latest 2>&1 | tee /tmp/pull.log; then
                PULL_SUCCESS=1
                USE_REGISTRY="ghcr"
                IMAGE_TO_USE="$GHCR_IMAGE:latest"
                echo "✅ GHCR镜像拉取成功！"
                echo "结束时间: $(date)"
              else
                echo "❌ 两个镜像源都拉取失败"
                echo "=== 拉取日志（最后50行）==="
                tail -50 /tmp/pull.log
                exit 1
              fi
            fi

            # 显示镜像信息
            echo ""
            echo "=== 使用镜像信息 ==="
            echo "仓库来源: $USE_REGISTRY"
            docker images "$IMAGE_TO_USE" --format "镜像ID: {{.ID}}  创建时间: {{.CreatedAt}}  大小: {{.Size}}"

            echo ""
            echo "⏹️  第三步：停止并删除旧容器..."

            # 老王备注：必须先停止容器，否则镜像无法删除
            if [ "$(docker ps -aq -f name=$CONTAINER_NAME)" ]; then
                echo "发现旧容器，正在停止..."
                docker stop $CONTAINER_NAME || true
                docker rm $CONTAINER_NAME || true
                echo "✅ 旧容器已停止并删除"
            else
                echo "ℹ️  没有旧容器"
            fi

            echo ""
            echo "🗑️  第四步：清理旧镜像..."

            # 老王备注：删除所有同名标签的旧镜像（保留新拉取的）
            # 先获取当前使用镜像的IMAGE ID
            CURRENT_IMAGE_ID=$(docker images "$IMAGE_TO_USE" --format "{{.ID}}")

            # 删除所有同名镜像（包括当前标签指向的旧层）
            docker images "$IMAGE_TO_USE" --format "{{.ID}}" | while read image_id; do
                if [ "$image_id" != "$CURRENT_IMAGE_ID" ]; then
                    echo "删除旧镜像: $image_id"
                    docker rmi -f "$image_id" 2>/dev/null || true
                fi
            done

            # 清理所有 <none> (dangling) 镜像
            docker image prune -f

            # 显示剩余镜像
            echo ""
            echo "=== 当前镜像列表 ==="
            docker images "$IMAGE_TO_USE"

            echo ""
            echo "📁 第五步：准备数据目录..."

            # 老王备注：创建独立的数据目录，不要覆盖代码目录！
            # /app/database - 数据库文件（独立挂载，不覆盖代码）
            # /app/backend - 代码目录（不要挂载！）
            mkdir -p ~/autogeo/data ~/autogeo/logs ~/autogeo/database ~/autogeo/cookies
            chmod -R 777 ~/autogeo
            echo "✅ 数据目录准备完成"

            echo ""
            echo "🚀 第六步：启动新容器..."

            docker rm -f $CONTAINER_NAME 2>/dev/null || true

            # 老王备注：先测试镜像是否能正常启动（诊断）
            echo "=== 测试镜像启动 ==="
            docker run --rm $IMAGE_TO_USE python -c "import sys; print('Python:', sys.version); from backend.database import init_db; print('✅ 模块导入成功')" || {
                echo "❌ 镜像测试失败，尝试直接运行"
            }

            CONTAINER_ID=$(docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p $PORT:8001 \
              -v ~/autogeo/data:/app/data \
              -v ~/autogeo/logs:/app/logs \
              -v ~/autogeo/database:/app/database \
              -v ~/autogeo/cookies:/app/.cookies \
              -e ENVIRONMENT=production \
              -e HOST=0.0.0.0 \
              -e PYTHONUNBUFFERED=1 \
              -e N8N_BASE_URL=https://n8n.opencaio.cn \
              -e RAGFLOW_BASE_URL=https://ragflow.xinzhixietong.com \
              --health-cmd="curl -f http://localhost:8001/api/health || exit 1" \
              --health-interval=30s \
              --health-timeout=10s \
              --health-retries=3 \
              $IMAGE_TO_USE)

            echo "✅ 容器已启动，ID: $CONTAINER_ID"

            # 老王备注：诊断容器内部环境
            echo ""
            echo "=== 容器内部环境诊断 ==="
            docker exec $CONTAINER_NAME python -c "import sys; print('PYTHONPATH:'); print(sys.path)" 2>/dev/null || echo "无法执行诊断"
            docker exec $CONTAINER_NAME ls -la /app/backend/ | head -10 2>/dev/null || echo "无法列出目录"

            echo ""
            echo "🔍 第七步：检查容器状态..."

            sleep 5
            CONTAINER_STATUS=$(docker inspect -f '{{.State.Status}}' $CONTAINER_NAME 2>/dev/null || echo "not_found")
            echo "容器状态: $CONTAINER_STATUS"

            if [ "$CONTAINER_STATUS" = "exited" ]; then
                echo "❌ 容器启动后立即退出！"
                echo "=== 容器日志 ==="
                docker logs $CONTAINER_NAME --tail 100
                exit 1
            fi

            echo ""
            echo "⏳ 第八步：等待服务就绪..."

            READY=0
            for i in {1..24}; do
                sleep 5
                if curl -f http://localhost:$PORT/api/health > /dev/null 2>&1; then
                    READY=1
                    echo "✅ 服务已就绪！"
                    break
                fi
                CONTAINER_STATUS=$(docker inspect -f '{{.State.Status}}' $CONTAINER_NAME 2>/dev/null || echo "not_found")
                if [ "$CONTAINER_STATUS" = "exited" ]; then
                    echo "❌ 容器在启动过程中退出！"
                    echo "=== 容器日志 ==="
                    docker logs $CONTAINER_NAME --tail 100
                    exit 1
                fi
                echo "等待中... ($i/24, 已等待 $((i*5))秒)"
            done

            if [ $READY -ne 1 ]; then
                echo "❌ 服务启动超时"
                echo "=== 容器状态 ==="
                docker ps -a | grep $CONTAINER_NAME
                echo "=== 容器日志 ==="
                docker logs $CONTAINER_NAME --tail 100
                exit 1
            fi

            echo ""
            echo "🎉 部署成功！"
            echo "📍 使用镜像源: $USE_REGISTRY"
            echo "📍 API 地址: http://$(hostname -I | awk '{print $1}'):$PORT"
            echo "📊 API 文档: http://$(hostname -I | awk '{print $1}'):$PORT/docs"
            echo "🔍 健康检查: http://$(hostname -I | awk '{print $1}'):$PORT/api/health"

      - name: Deployment Summary
        if: success()
        run: |
          echo "### 🎉 后端部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **镜像**: ${{ env.ALIYUN_IMAGE }}:latest (阿里云广州)" >> $GITHUB_STEP_SUMMARY
          echo "- **备用镜像**: ${{ env.GHCR_IMAGE }}:latest (GHCR)" >> $GITHUB_STEP_SUMMARY
          echo "- **服务器**: ${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **端口**: ${{ secrets.BACKEND_PORT || 8001 }}" >> $GITHUB_STEP_SUMMARY
