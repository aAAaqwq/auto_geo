name: Backend Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: '部署到服务器'
        required: true
        default: 'true'

env:
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  IMAGE_NAME: auto_geo_backend
  # 老王备注：Docker镜像名必须小写！
  REPO_OWNER_LOWER: architecture-matrix

jobs:
  # ============================================
  # 第一步：构建并推送 Docker 镜像
  # ============================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_OWNER_LOWER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_OWNER_LOWER }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_OWNER_LOWER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # ============================================
  # 第二步：部署到服务器
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: false  # 老王备注：改为false，避免单步失败就停止
          timeout: 1200s  # 老王备注：20分钟总超时
          command_timeout: 900s  # 老王备注：单个命令15分钟超时
          script: |
            set -e  # 遇到错误立即退出

            echo "🚀 开始部署 AutoGeo 后端..."

            # 设置变量
            IMAGE_NAME="auto_geo_backend"
            REGISTRY="ghcr.io"
            REPO_OWNER="architecture-matrix"
            CONTAINER_NAME="autogeo-backend"
            PORT="${{ secrets.BACKEND_PORT || 8001 }}"

            # 登录到 GHCR（老王备注：服务器也需要认证才能拉取私有镜像）
            echo "🔐 登录到 GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u "${{ github.actor }}" --password-stdin

            # 拉取最新镜像（老王备注：添加超时控制避免卡住）
            echo "📦 拉取最新镜像..."
            timeout 600 docker pull $REGISTRY/$REPO_OWNER/$IMAGE_NAME:latest
            if [ $? -eq 0 ]; then
              echo "✅ 镜像拉取成功"
            else
              echo "❌ 镜像拉取失败或超时"
              exit 1
            fi

            echo "📋 继续部署流程..."

            # 停止并删除旧容器
            echo "⏹️  停止旧容器..."
            if [ "$(docker ps -q -f name=$CONTAINER_NAME)" ]; then
              docker stop $CONTAINER_NAME || true
              docker rm $CONTAINER_NAME || true
              echo "✅ 旧容器已停止"
            else
              echo "ℹ️ 没有运行中的旧容器"
            fi

            echo "📋 准备创建数据目录..."

            # 创建数据目录（老王备注：确保容器内用户可写）
            echo "📁 创建数据目录..."
            mkdir -p ~/autogeo/data ~/autogeo/logs ~/autogeo/database ~/autogeo/cookies
            echo "✅ 数据目录创建完成"

            # 修复权限（简单粗暴：给所有人写权限）
            echo "🔑 修复目录权限..."
            chmod -R 777 ~/autogeo
            echo "✅ 权限修复完成"

            echo "📋 准备启动容器..."

            # 启动新容器
            echo "🚀 启动新容器..."
            CONTAINER_ID=$(docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p $PORT:8001 \
              -v ~/autogeo/data:/app/data \
              -v ~/autogeo/logs:/app/logs \
              -v ~/autogeo/database:/app/backend/database \
              -v ~/autogeo/cookies:/app/.cookies \
              -e ENVIRONMENT=production \
              -e HOST=0.0.0.0 \
              -e PYTHONUNBUFFERED=1 \
              $REGISTRY/$REPO_OWNER/$IMAGE_NAME:latest)
            echo "✅ 容器已启动，ID: $CONTAINER_ID"

            # 立即检查容器状态（老王备注：不要傻等，立即诊断）
            echo "🔍 检查容器状态..."
            sleep 3
            CONTAINER_STATUS=$(docker inspect -f '{{.State.Status}}' $CONTAINER_NAME 2>/dev/null || echo "not_found")
            echo "容器状态: $CONTAINER_STATUS"

            # 如果容器已退出，打印日志
            if [ "$CONTAINER_STATUS" = "exited" ]; then
                echo "❌ 容器启动后立即退出！"
                echo "=== 容器日志 ==="
                docker logs $CONTAINER_NAME --tail 50
                exit 1
            fi

            # 等待服务启动（减少等待时间，多次检查）
            echo "⏳ 等待服务启动..."
            for i in {1..12}; do
                sleep 5
                if curl -f http://localhost:$PORT/api/health > /dev/null 2>&1; then
                    echo "✅ 服务启动成功！"
                    break
                fi
                # 每5秒检查一次容器状态
                CONTAINER_STATUS=$(docker inspect -f '{{.State.Status}}' $CONTAINER_NAME 2>/dev/null || echo "not_found")
                if [ "$CONTAINER_STATUS" = "exited" ]; then
                    echo "❌ 容器在启动过程中退出！"
                    echo "=== 容器日志 ==="
                    docker logs $CONTAINER_NAME --tail 50
                    exit 1
                fi
                echo "等待中... ($i/12)"
            done

            # 健康检查
            echo "🔍 健康检查..."
            if curl -f http://localhost:$PORT/api/health > /dev/null 2>&1; then
              echo "✅ 后端服务启动成功！"
              echo "📍 API 地址: http://$(hostname -I | awk '{print $1}'):$PORT"
              echo "📊 API 文档: http://$(hostname -I | awk '{print $1}'):$PORT/docs"
            else
              echo "❌ 后端服务启动失败！"
              echo "=== 容器状态 ==="
              docker ps -a | grep $CONTAINER_NAME
              echo "=== 容器日志 ==="
              docker logs $CONTAINER_NAME --tail 100
              exit 1
            fi

            # 清理旧镜像
            echo "🧹 清理未使用的镜像..."
            docker image prune -f

            echo "🎉 部署完成！"

      # 可选：发送部署通知
      - name: Deployment Summary
        run: |
          echo "### 🎉 后端部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **镜像**: ${{ env.REGISTRY }}/${{ env.REPO_OWNER_LOWER }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **服务器**: ${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **端口**: ${{ secrets.BACKEND_PORT || 8001 }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 下一步" >> $GITHUB_STEP_SUMMARY
          echo "1. 前端更新 API 地址为服务器IP" >> $GITHUB_STEP_SUMMARY
          echo "2. 打包 Electron 应用" >> $GITHUB_STEP_SUMMARY
