name: Electron Build & Release

on:
  # 老王备注（2026-02-25）：推送tag时触发（正式发布）或frontend代码更新时触发（自动构建）
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
    paths:
      - 'frontend/**'
      - '.github/workflows/electron-build.yml'
  # 老王备注（2026-02-25）：支持手动触发
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.0)'
        required: false
        default: 'auto'
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # 第一步：检查代码质量
  # ============================================
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        env:
          # 老王备注（2026-02-25）：配置Electron国内镜像加速下载
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run TypeScript check
        run: npm run type-check
        continue-on-error: true

  # ============================================
  # 第二步：构建跨平台安装包
  # ============================================
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    needs: check

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            platform: windows
            arch: x64
            target: nsis

          # Linux
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: AppImage

          # macOS
          - os: macos-latest
            platform: macos
            arch: x64
            target: dmg

    permissions:
      contents: write

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        env:
          # 老王备注（2026-02-25）：配置Electron国内镜像加速下载
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      # 老王备注：修复Electron安装问题
      - name: Fix Electron path.txt (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (Test-Path "node_modules\electron\dist\electron.exe") {
            "electron.exe" | Out-File -Encoding ASCII "node_modules\electron\path.txt"
            Write-Host "✅ Fixed Electron path.txt for Windows"
          }

      - name: Fix Electron path.txt (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ -f "node_modules/electron/dist/electron" ]; then
            echo "electron" > node_modules/electron/path.txt
            echo "✅ Fixed Electron path.txt for Linux/macOS"
          fi

      - name: Build renderer
        run: npm run build:renderer

      - name: Build electron main
        run: npm run build:electron

      # 老王备注（2026-02-25）：调用构建前准备脚本
      - name: Run before-build script
        run: node scripts/before-build.js

      - name: Build for Windows
        if: runner.os == 'Windows'
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win -- --${{ matrix.target }}

      - name: Build for Linux
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux -- --${{ matrix.target }}

      - name: Build for macOS
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac -- --${{ matrix.target }}

      # 老王备注：验证Windows构建产物
      - name: Verify Windows build
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "=== 验证Windows构建产物 ==="
          if (Test-Path "dist") {
            Get-ChildItem -Path dist -File | ForEach-Object {
              Write-Host "✅ 找到: $($_.Name)"
              Write-Host "   大小: $([math]::Round($_.Length/1MB, 2)) MB"
              Write-Host "   修改时间: $($_.LastWriteTime)"
            }
          } else {
            Write-Host "❌ dist目录不存在！"
            exit 1
          }

          # 检查exe文件
          $exeFiles = Get-ChildItem -Path dist -Filter "*.exe" -ErrorAction SilentlyContinue
          if (-not $exeFiles) {
            Write-Host "❌ 未找到exe文件！"
            exit 1
          }
          Write-Host "✅ exe文件验证通过！"

      # 老王备注：验证Linux构建产物
      - name: Verify Linux build
        if: runner.os == 'Linux'
        run: |
          echo "=== 验证Linux构建产物 ==="
          ls -lh dist/ 2>/dev/null || echo "dist目录不存在"
          if [ ! "$(ls -A dist/*.AppImage dist/*.deb 2>/dev/null)" ]; then
            echo "❌ 未找到Linux构建产物！"
            exit 1
          fi
          echo "✅ Linux构建产物验证通过！"

      # 老王备注：验证macOS构建产物
      - name: Verify macOS build
        if: runner.os == 'macOS'
        run: |
          echo "=== 验证macOS构建产物 ==="
          ls -lh dist/ 2>/dev/null || echo "dist目录不存在"
          if [ ! "$(ls -A dist/*.dmg 2>/dev/null)" ]; then
            echo "❌ 未找到macOS构建产物！"
            exit 1
          fi
          echo "✅ macOS构建产物验证通过！"

      # 老王备注：列出所有构建产物（用于调试）
      - name: List all build artifacts
        if: always()
        run: |
          echo "=== dist目录内容 ==="
          ls -lah dist/ 2>/dev/null || echo "dist目录不存在"

      # 老王备注：只在tag推送或手动触发create_release=true时上传到Release
      - name: Upload artifacts to release
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.msi
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.target }}
          path: dist/*
          retention-days: 30
          if-no-files-found: error
        if: always()

      - name: Build summary
        if: success()
        run: |
          echo "### 🎉 ${{ matrix.platform }} 构建成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **平台**: ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "- **架构**: ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **格式**: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 构建产物：" >> $GITHUB_STEP_SUMMARY
          if [ "${{ runner.os }}" = "Windows" ]; then
            Get-ChildItem -Path dist -Filter "*.exe" | ForEach-Object {
              echo "- $($_.Name) ($([math]::Round($_.Length/1MB, 2)) MB)" >> $GITHUB_STEP_SUMMARY
            }
          fi
        shell: bash
        if: runner.os == 'Windows'
