name: Electron Build & Release

on:
  # 备注（2026-02-25）：推送tag时触发（正式发布）或frontend代码更新时触发（自动构建）
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
    paths:
      - 'frontend/**'
      - '.github/workflows/electron-build.yml'
  # 备注（2026-02-25）：支持手动触发
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.0)'
        required: false
        default: 'auto'
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # 第一步：检查代码质量
  # ============================================
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        env:
          # 备注（2026-02-26）：配置Electron国内镜像加速下载（必须同时配置两个！）
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run TypeScript check
        run: npm run type-check
        continue-on-error: true

  # ============================================
  # 第二步：构建跨平台安装包
  # ============================================
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    needs: check

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            platform: windows
            arch: x64
            target: nsis

          # Linux
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: AppImage

          # macOS
          - os: macos-latest
            platform: macos
            arch: x64
            target: dmg

    permissions:
      contents: write

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        env:
          # 备注（2026-02-26）：配置Electron国内镜像加速下载（必须同时配置两个！）
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      # 修复Electron安装问题
      - name: Fix Electron path.txt (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          if (Test-Path "node_modules\electron\dist\electron.exe") {
            "electron.exe" | Out-File -Encoding ASCII "node_modules\electron\path.txt"
            Write-Host "✅ Fixed Electron path.txt for Windows"
          }

      - name: Fix Electron path.txt (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          if [ -f "node_modules/electron/dist/electron" ]; then
            echo "electron" > node_modules/electron/path.txt
            echo "✅ Fixed Electron path.txt for Linux/macOS"
          fi

      - name: Build renderer
        run: npm run build:renderer

      - name: Build electron main
        run: npm run build:electron

      # 备注（2026-02-25）：调用构建前准备脚本
      - name: Run before-build script
        run: node scripts/before-build.js

      - name: Build for Windows
        if: matrix.platform == 'windows'
        shell: powershell
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Build for Linux
        if: matrix.platform == 'linux'
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux

      - name: Build for macOS
        if: matrix.platform == 'macos'
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac

      # 验证Windows构建产物
      - name: Verify Windows build
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Write-Host "=== 验证Windows构建产物 ==="
          if (Test-Path "dist") { Get-ChildItem -Path dist -File | ForEach-Object { Write-Host "✅ 找到: $($_.Name)"; Write-Host "   大小: $([math]::Round($_.Length/1MB, 2)) MB"; Write-Host "   修改时间: $($_.LastWriteTime)" } } else { Write-Host "❌ dist目录不存在！"; exit 1 }
          $exeFiles = Get-ChildItem -Path dist -Filter "*.exe" -ErrorAction SilentlyContinue
          if (-not $exeFiles) { Write-Host "❌ 未找到exe文件！"; exit 1 }
          Write-Host "✅ exe文件验证通过！"

      # 验证Linux构建产物
      - name: Verify Linux build
        if: matrix.platform == 'linux'
        run: |
          echo "=== 验证Linux构建产物 ==="
          ls -lh dist/ 2>/dev/null || echo "dist目录不存在"
          if [ ! "$(ls -A dist/*.AppImage dist/*.deb 2>/dev/null)" ]; then
            echo "❌ 未找到Linux构建产物！"
            exit 1
          fi
          echo "✅ Linux构建产物验证通过！"

      # 验证macOS构建产物
      - name: Verify macOS build
        if: matrix.platform == 'macos'
        run: |
          echo "=== 验证macOS构建产物 ==="
          ls -lh dist/ 2>/dev/null || echo "dist目录不存在"
          if [ ! "$(ls -A dist/*.dmg 2>/dev/null)" ]; then
            echo "❌ 未找到macOS构建产物！"
            exit 1
          fi
          echo "✅ macOS构建产物验证通过！"

      # 列出所有构建产物（用于调试）
      - name: List all build artifacts (Windows)
        if: always() && matrix.platform == 'windows'
        shell: pwsh
        run: |
          Write-Host "=== dist目录内容 ==="
          if (Test-Path "dist") { Get-ChildItem -Path dist -File | ForEach-Object { Write-Host "$($_.Name) - $([math]::Round($_.Length/1MB, 2)) MB" } } else { Write-Host "dist目录不存在" }

      # 列出所有构建产物（用于调试）
      - name: List all build artifacts (Linux/macOS)
        if: always() && matrix.platform != 'windows'
        run: |
          echo "=== dist目录内容 ==="
          ls -lah dist/ 2>/dev/null || echo "dist目录不存在"

      # 只在tag推送或手动触发create_release=true时上传到Release
      # 备注（2026-02-26）：先复制文件到根目录dist/，再上传（working-directory对uses步骤不生效）
      - name: Copy files for release
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ../dist -Force | Out-Null
          Copy-Item dist/*.* ../dist/ -Force
          Write-Host "✅ 复制文件到根目录dist/完成"

      - name: Upload artifacts to release
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.msi
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 备注（2026-02-26）：上传构建artifacts到GitHub（路径相对于仓库根目录）
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.target }}
          path: frontend/dist/*
          retention-days: 30
          if-no-files-found: error
        if: always()

      # 备注（2026-02-26）：Windows构建摘要（使用纯bash语法）
      - name: Build summary (Windows)
        if: success() && matrix.platform == 'windows'
        shell: bash
        run: |
          echo "### 🎉 ${{ matrix.platform }} 构建成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **平台**: ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "- **架构**: ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **格式**: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 构建产物：" >> $GITHUB_STEP_SUMMARY
          if [ -d "dist" ]; then
            for file in dist/*.exe; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                size=$(ls -lh "$file" | awk '{print $5}')
                echo "- $filename ($size)" >> $GITHUB_STEP_SUMMARY
              fi
            done
          fi

      # 备注（2026-02-26）：Linux/macOS构建摘要（使用纯bash语法）
      - name: Build summary (Linux/macOS)
        if: success() && matrix.platform != 'windows'
        run: |
          echo "### 🎉 ${{ matrix.platform }} 构建成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **平台**: ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "- **架构**: ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **格式**: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 构建产物：" >> $GITHUB_STEP_SUMMARY
          if [ -d "dist" ]; then
            for file in dist/*.{AppImage,deb,dmg}; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                size=$(ls -lh "$file" | awk '{print $5}')
                echo "- $filename ($size)" >> $GITHUB_STEP_SUMMARY
              fi
            done
          fi
