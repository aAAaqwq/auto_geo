# ========================================
# Startup Validation CI/CD
# Maintainer: 老王
# Purpose: 验证clone后能否正常启动前后端
# Updated: 2026-02-25
# ========================================
#
# 老王备注：
# 这个SB工作流专门用来验证clone仓库后能否正常启动
# 每次push和PR都会跑，确保不会有人clone下来就启动不了
# 艹，这种SB问题老王我见多了！
#

name: Startup Validation

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, main]
  workflow_dispatch:  # 允许手动触发

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ==================== 后端启动验证 ====================
  backend-startup:
    name: 🚀 Backend Startup Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64

      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Create environment file
        working-directory: ./backend
        run: |
          if [ ! -f .env ]; then
            cp ../.env.example .env || echo "N8N_WEBHOOK_URL=http://localhost:5678/webhook" > .env
          fi

      - name: Start backend server
        run: |
          # 设置PYTHONPATH并后台启动服务器，记录日志
          PYTHONPATH=. python -m backend.main > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"

          # 等待服务器启动，同时显示日志
          for i in {1..30}; do
            if curl -f http://127.0.0.1:8001/ > /dev/null 2>&1; then
              echo "✅ Backend started successfully!"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
            # 每5次检查显示一次日志
            if [ $((i % 5)) -eq 0 ]; then
              echo "=== Backend Log (last 20 lines) ==="
              tail -20 /tmp/backend.log || true
              echo "==================================="
            fi
          done

          # 如果最终失败，显示完整日志
          if ! curl -f http://127.0.0.1:8001/ > /dev/null 2>&1; then
            echo "❌ Backend failed to start!"
            echo "=== Full Backend Log ==="
            cat /tmp/backend.log
            echo "========================"
            exit 1
          fi

          # 健康检查
          curl -f http://127.0.0.1:8001/ || exit 1
          curl -f http://127.0.0.1:8001/api/health || exit 1

          # 停止服务器
          kill $BACKEND_PID || true
          echo "✅ Backend startup validation passed!"

      - name: Check API endpoints
        run: |
          # 再次启动服务器进行API检查
          PYTHONPATH=. python -m backend.main > /tmp/backend_api.log 2>&1 &
          BACKEND_PID=$!
          sleep 10

          # 检查关键API端点
          curl -f http://127.0.0.1:8001/api/platforms || {
            echo "=== Backend Log ==="
            cat /tmp/backend_api.log
            exit 1
          }
          curl -f http://127.0.0.1:8001/docs || exit 1

          kill $BACKEND_PID || true

  # ==================== 前端启动验证 ====================
  frontend-startup:
    name: 🎨 Frontend Startup Check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        # 暂时不测试macOS，因为没有Mac runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        env:
          # 老王备注（2026-02-25）：配置Electron国内镜像加速下载
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: npm install

      # 老王备注：验证Electron二进制文件是否存在
      - name: Verify Electron binary exists
        working-directory: ./frontend
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ELECTRON_BIN="node_modules/electron/dist/electron.exe"
          else
            ELECTRON_BIN="node_modules/electron/dist/electron"
          fi

          if [ ! -f "$ELECTRON_BIN" ]; then
            echo "❌ Electron binary not found at: $ELECTRON_BIN"
            echo "Trying to reinstall Electron..."
            # 老王备注：重新安装Electron（会使用镜像）
            npm rebuild electron
          fi

          # 再次检查
          if [ ! -f "$ELECTRON_BIN" ]; then
            echo "❌ Electron binary still missing after rebuild attempt"
            ls -la node_modules/ | head -20 || echo "node_modules directory issue"
            exit 1
          fi

          echo "✅ Electron binary exists at: $ELECTRON_BIN"

      - name: Fix Electron path.txt (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        working-directory: ./frontend
        run: |
          # 修复Windows下的Electron安装问题
          if (Test-Path "node_modules\electron\dist\electron.exe") {
            "electron.exe" | Out-File -Encoding ASCII "node_modules\electron\path.txt"
            Write-Host "✅ Fixed Electron path.txt for Windows"
          }

      - name: Fix Electron path.txt (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: ./frontend
        run: |
          # 修复Linux/macOS下的Electron安装问题
          if [ -f "node_modules/electron/dist/electron" ]; then
            echo "electron" > node_modules/electron/path.txt
            echo "✅ Fixed Electron path.txt for Linux"
          fi

      - name: Build renderer
        working-directory: ./frontend
        run: npm run build:renderer

      - name: Build Electron main process
        working-directory: ./frontend
        run: npm run build:electron

      - name: Verify Electron executable (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        working-directory: ./frontend
        run: |
          Test-Path "node_modules\electron\dist\electron.exe"

      - name: Verify Electron executable (Linux)
        if: runner.os != 'Windows'
        working-directory: ./frontend
        run: |
          test -f "node_modules/electron/dist/electron"

      - name: Check build output (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        working-directory: ./frontend
        run: |
          Test-Path "out\electron\main\index.js"

      - name: Check build output (Linux)
        if: runner.os != 'Windows'
        working-directory: ./frontend
        run: |
          test -f "out/electron/main/index.js"

      # 老王备注（2026-02-25）：GitHub Actions runner是无GUI环境，无法启动Electron窗口
      # 所以只验证构建输出和二进制文件存在，不尝试启动Electron
      - name: Final build validation
        working-directory: ./frontend
        shell: bash
        run: |
          echo "✅ Frontend build validation passed:"
          echo "  - Renderer process built (dist/)"
          echo "  - Electron main process built (out/electron/main/index.js)"
          echo "  - Electron binary exists (node_modules/electron/dist/)"
          echo ""
          echo "⚠️  Note: Skipped Electron startup test (CI环境无GUI，无法启动窗口)"

  # ==================== 依赖检查 ====================
  dependency-check:
    name: 📦 Dependency Validation
    runs-on: ubuntu-latest
    # 老王备注（2026-02-25）：dependency-review-action只在PR时运行，tag推送会报错
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 老王备注（2026-02-25）：添加前端依赖安全检查（仅PR时）
      - name: Frontend Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0

      - name: Check backend dependencies
        working-directory: ./backend
        run: |
          if [ ! -f requirements.txt ]; then
            echo "❌ requirements.txt not found!"
            exit 1
          fi
          echo "✅ Backend dependencies file exists"

      # 老王备注（2026-02-25）：添加后端pip-audit安全检查
      - name: Backend Security Audit
        working-directory: ./backend
        run: |
          pip install pip-audit
          pip-audit --strict || echo "⚠️  Security issues found, continuing..."
        continue-on-error: true

      - name: Check frontend dependencies
        working-directory: ./frontend
        run: |
          if [ ! -f package.json ]; then
            echo "❌ package.json not found!"
            exit 1
          fi
          if [ ! -f package-lock.json ]; then
            echo "❌ package-lock.json not found!"
            exit 1
          fi
          echo "✅ Frontend dependency files exist"

      - name: Check environment templates
        run: |
          if [ ! -f .env.example ]; then
            echo "⚠️  .env.example not found (optional)"
          else
            echo "✅ Environment template exists"
          fi

  # ==================== 文档检查 ====================
  docs-check:
    name: 📖 Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check README
        run: |
          if [ ! -f README.md ]; then
            echo "❌ README.md not found!"
            exit 1
          fi
          echo "✅ README.md exists"

          # 检查README是否包含启动说明
          if grep -q "快速开始" README.md || grep -q "Quick Start" README.md; then
            echo "✅ README contains startup instructions"
          else
            echo "⚠️  README should contain startup instructions"
          fi

      - name: Check quickstart script
        run: |
          if [ -f quickstart.bat ] || [ -f quickstart.sh ]; then
            echo "✅ Quickstart script exists"
          else
            echo "⚠️  No quickstart script found (optional)"
          fi
