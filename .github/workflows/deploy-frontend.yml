name: Deploy Frontend

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      deploy:
        description: '部署到服务器'
        required: true
        default: 'true'

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # 代码质量检查与测试
  # ============================================
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Run tests
        run: npm run test || true

      - name: Build application
        run: npm run build || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/out/renderer
          retention-days: 1

  # ============================================
  # 部署到服务器
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Create production env
        working-directory: ./frontend
        run: |
          cat > .env.production << EOF
          VITE_API_BASE_URL=http://${{ secrets.SERVER_HOST }}/api
          VITE_WS_URL=ws://${{ secrets.SERVER_HOST }}/ws
          VITE_STATIC_URL=http://${{ secrets.SERVER_HOST }}/static
          VITE_ENABLE_MOCK=false
          VITE_APP_TITLE=AutoGeo
          EOF

      - name: Build for production
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "frontend/out/renderer/*"
          target: "~/Auto_GEO/deploy/nginx/html"
          strip_components: 2
          rm: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            echo "🚀 [Frontend] 开始部署..."

            PROJECT_DIR="~/Auto_GEO"
            NGINX_DIR="$PROJECT_DIR/deploy/nginx"

            # 确保目录存在
            mkdir -p "$NGINX_DIR/html"

            cd "$PROJECT_DIR/deploy"

            # 检查 Nginx 容器是否运行
            if docker-compose -f docker-compose.backend.yml ps nginx | grep -q "Up"; then
              echo "🔄 重载 Nginx 配置..."
              docker-compose -f docker-compose.backend.yml exec -T nginx nginx -s reload || {
                echo "⚠️ Nginx reload 失败，尝试重启..."
                docker-compose -f docker-compose.backend.yml restart nginx
              }
            else
              echo "🚀 启动 Nginx..."
              docker-compose -f docker-compose.backend.yml up -d nginx
            fi

            echo ""
            echo "========================================"
            echo "✅ 前端部署完成"
            echo "========================================"
            echo "访问地址: http://${{ secrets.SERVER_HOST }}"

      - name: Deployment Summary
        if: success()
        run: |
          echo "### 🎨 前端部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 服务器 | ${{ secrets.SERVER_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 部署目录 | ~/Auto_GEO/deploy/nginx/html |" >> $GITHUB_STEP_SUMMARY
          echo "| 访问地址 | http://${{ secrets.SERVER_HOST }} |" >> $GITHUB_STEP_SUMMARY
