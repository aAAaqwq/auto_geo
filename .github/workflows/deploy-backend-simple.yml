name: Deploy Backend (Build on Server)

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'backend/requirements.txt'
      - 'backend/Dockerfile'
      - '.github/workflows/deploy-backend-simple.yml'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================
  # 代码质量检查
  # ============================================
  lint:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with Ruff
        working-directory: ./backend
        run: ruff check . || true

      - name: Run tests
        working-directory: ./backend
        run: pytest tests/unit -v || true

  # ============================================
  # 部署到服务器（服务器上构建）
  # ============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: false
          timeout: 600s  # 构建可能需要较长时间
          script: |
            set -e
            echo "🚀 [Backend] 开始部署（服务器本地构建）..."

            PROJECT_DIR="$HOME/Auto_GEO"
            DEPLOY_DIR="$PROJECT_DIR/deploy"

            # 如果目录不存在，克隆项目
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "📦 项目不存在，克隆仓库..."
              git clone https://github.com/Architecture-Matrix/Auto_GEO.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"

            # 拉取最新代码
            echo "📥 拉取最新代码..."
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

            # 检查环境变量文件
            if [ ! -f "$DEPLOY_DIR/.env.backend" ]; then
              echo "⚠️ 警告: .env.backend 不存在，使用示例配置"
              cp "$DEPLOY_DIR/.env.simple.example" "$DEPLOY_DIR/.env.backend"
              echo "❌ 请手动修改 $DEPLOY_DIR/.env.backend 中的配置"
              exit 1
            fi

            cd "$DEPLOY_DIR"

            # 在服务器上构建镜像
            echo "🔨 构建 Docker 镜像..."
            docker build -t autogeo-backend:latest -f ../backend/Dockerfile ../backend

            # 更新 docker-compose 使用本地镜像
            echo "📝 更新 docker-compose 配置..."
            sed -i 's|image: .*auto_geo_backend:latest|image: autogeo-backend:latest|' docker-compose.backend.yml

            # 重启服务
            echo "🔄 重启后端服务..."
            docker-compose -f docker-compose.backend.yml up -d

            # 等待服务启动
            echo "⏳ 等待服务启动..."
            sleep 15

            # 健康检查
            echo "🏥 健康检查..."
            if curl -sf http://localhost:8001/api/health > /dev/null 2>&1; then
              echo "✅ [Backend] 部署成功！服务运行正常"
            else
              echo "⚠️ [Backend] 健康检查失败，查看日志:"
              docker-compose -f docker-compose.backend.yml logs --tail=50 backend
              exit 1
            fi

            echo ""
            echo "========================================"
            echo "✅ 后端部署完成"
            echo "========================================"
            echo "API地址: http://${{ secrets.SERVER_HOST }}/api"
            echo "文档地址: http://${{ secrets.SERVER_HOST }}/docs"

      - name: Deployment Summary
        if: success()
        run: |
          echo "### 🎉 后端部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 构建方式 | 服务器本地构建 |" >> $GITHUB_STEP_SUMMARY
          echo "| 服务器 | ${{ secrets.SERVER_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 部署目录 | ~/Auto_GEO/deploy |" >> $GITHUB_STEP_SUMMARY
          echo "| API地址 | http://${{ secrets.SERVER_HOST }}/api |" >> $GITHUB_STEP_SUMMARY
