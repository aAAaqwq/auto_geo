# AutoGeo 后端生产环境部署配置（极简版）
# 版本: 3.3.1
# 说明: 只部署后端服务，使用服务器Nginx做反向代理

services:
  backend:
    image: ${BACKEND_IMAGE:-crpi-lwz264sedmauvivo.cn-guangzhou.personal.cr.aliyuncs.com/opencaio/auto_geo_backend:latest}
    container_name: autogeo_backend
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '2G'
        reservations:
          cpus: '0.5'
          memory: '512M'
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DATABASE_URL=${DATABASE_URL:-postgresql://n8n:opencaio%40321@n8n_postgres:5432/autogeo}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-20}
      - DB_POOL_TIMEOUT=${DB_POOL_TIMEOUT:-30}
      - DB_POOL_RECYCLE=${DB_POOL_RECYCLE:-3600}
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      - N8N_API_KEY=${N8N_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-}
      - RAGFLOW_BASE_URL=${RAGFLOW_BASE_URL:-}
      - AUTO_GEO_ENCRYPTION_KEY=${AUTO_GEO_ENCRYPTION_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
      - ./backups:/app/backups
      - playwright_cache:/ms-playwright
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - n8n_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "local"
      options:
        max-size: "100m"
        max-file: "3"

networks:
  n8n_network:
    external: true
    name: n8n_network

volumes:
  backend_data:
    name: autogeo_backend_data
  backend_logs:
    name: autogeo_backend_logs
  playwright_cache:
    name: autogeo_playwright_cache
