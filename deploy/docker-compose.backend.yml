# AutoGeo 后端生产环境部署配置（简化版 - 共享 n8n 数据库）
# 版本: 3.3.0
# 说明: 使用 n8n 的 PostgreSQL 和 Redis，无需重复部署

services:
  # ============================================
  # FastAPI 后端服务（使用 n8n 的数据库）
  # ============================================
  backend:
    image: ${BACKEND_IMAGE:-crpi-lwz264sedmauvivo.cn-guangzhou.personal.cr.aliyuncs.com/opencaio/auto_geo_backend:latest}
    container_name: autogeo_backend
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '2G'
        reservations:
          cpus: '0.5'
          memory: '512M'
    env_file:
      - .env.backend
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      # 使用 n8n 的 PostgreSQL（数据库名：autogeo）
      - DATABASE_URL=postgresql://n8n:${N8N_DB_PASSWORD:-n8n_password_2024}@n8n_postgres:5432/autogeo
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-20}
      - DB_POOL_TIMEOUT=${DB_POOL_TIMEOUT:-30}
      - DB_POOL_RECYCLE=${DB_POOL_RECYCLE:-3600}
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      - N8N_API_KEY=${N8N_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-}
      - RAGFLOW_BASE_URL=${RAGFLOW_BASE_URL:-}
      - AUTO_GEO_ENCRYPTION_KEY=${AUTO_GEO_ENCRYPTION_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
      - ./backups:/app/backups
      - playwright_cache:/ms-playwright
    networks:
      # 连接到 n8n 的网络，使用 n8n 的数据库
      - n8n_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "local"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================
  # Nginx 反向代理 + 静态文件服务
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: autogeo_nginx
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '256M'
        reservations:
          cpus: '0.1'
          memory: '64M'
    ports:
      - "80:80"
      # - "443:443"  # HTTPS 启用时取消注释
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - n8n_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "local"
      options:
        max-size: "100m"
        max-file: "3"

# ============================================
# 网络配置（使用 n8n 的网络）
# ============================================
networks:
  n8n_network:
    external: true
    name: n8n_network

# ============================================
# 数据卷配置
# ============================================
volumes:
  backend_data:
    name: autogeo_backend_data
  backend_logs:
    name: autogeo_backend_logs
  playwright_cache:
    name: autogeo_playwright_cache
  nginx_logs:
    name: autogeo_nginx_logs
